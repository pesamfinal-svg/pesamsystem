# Konfiguracja zasobów dla Firebase App Hosting
runConfig:
  # Zwiększamy pamięć do 2GB, aby obsłużyć rozpakowywanie dużych ZIPów
  memoryMiB: 2048
  cpu: 1
  # Minimalna liczba instancji (0 oznacza oszczędność kosztów, gdy nikt nie używa)
  minInstances: 0
  maxInstances: 10

env:
  # Upewnij się, że masz tu ustawione zmienne środowiskowe, jeśli ich używasz
  - variable: STORAGE_BUCKET
    value: "pesam-system-81165.firebasestorage.app"